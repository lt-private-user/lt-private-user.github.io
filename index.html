<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herbstliche Galerie</title>
    <style>
        /* Herbstliche Farben */
        :root {
            --banner-color: #E74C3C;
            --background-color: #FFF5E1;
            --card-color: #F39C12;
            --footer-color: #D35400;
            --text-color: #4E342E;
            --modal-bg-color: #990000; /* minimal blasseres Dunkelrot */
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--banner-color);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            font-size: 2rem;
            font-weight: bold;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            padding: 2rem;
        }

        .gallery-item {
            background-color: var(--card-color);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            display: block;
        }

        footer {
            background-color: var(--footer-color);
            color: white;
            text-align: center;
            padding: 1.5rem;
            font-size: 1rem;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--modal-bg-color);
            color: white;
            width: 80%;
            max-width: 900px;
            display: flex;
            border-radius: 10px;
            overflow: hidden;
            animation: fadeIn 0.3s;
        }

        .modal img {
            width: 50%;
            object-fit: cover;
        }

        .modal-description {
            padding: 2rem;
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @media(max-width: 700px) {
            .modal-content {
                flex-direction: column;
            }
            .modal img, .modal-description {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header>
    Herbstliche Galerie
</header>

<main>
    <div class="gallery-item" data-description="Beschreibung für Bild 1">
        <img src="bilder/Designer.png" alt="Bild 1">
    </div>
    <div class="gallery-item" data-description="Beschreibung für Bild 2">
        <img src="bilder/bild2.jpg" alt="Bild 2">
    </div>
    <div class="gallery-item" data-description="Beschreibung für Bild 3">
        <img src="bilder/bild3.jpg" alt="Bild 3">
    </div>
    <div class="gallery-item" data-description="Beschreibung für Bild 4">
        <img src="bilder/bild4.jpg" alt="Bild 4">
    </div>
    <div class="gallery-item" data-description="Beschreibung für Bild 5">
        <img src="bilder/bild5.jpg" alt="Bild 5">
    </div>
</main>

<footer>
    &copy; 2025 Herbstliche Galerie. Alle Rechte vorbehalten.
</footer>

<!-- Modal -->
<div class="modal" id="modal">
    <span class="close" id="close">&times;</span>
    <div class="modal-content">
        <img id="modal-img" src="" alt="Bild">
        <div class="modal-description" id="modal-desc"></div>
    </div>
</div>

<script>
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');
    const modalDesc = document.getElementById('modal-desc');
    const closeBtn = document.getElementById('close');

    document.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', () => {
            modal.style.display = 'flex';
            modalImg.src = item.querySelector('img').src;
            modalDesc.textContent = item.dataset.description;
        });
    });

    closeBtn.addEventListener('click', () => {
        modal.style.display = 'none';
    });

    window.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    });
</script>

</body>
</html>
